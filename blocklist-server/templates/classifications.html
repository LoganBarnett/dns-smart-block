<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Classifications{{FILTER_INFO}}</title>
  <link rel="stylesheet" href="/static/classifications.css">
</head>
<body>
  <h1>Classifications{{FILTER_INFO}}</h1>
  {{ADMIN_ACTIONS}}
  <div class="count">Total: {{COUNT}} classification(s)</div>
  <table id="classificationsTable">
    <thead>
      <tr>
        <th onclick="sortTable('classificationsTable', 0)">Domain</th>
        <th onclick="sortTable('classificationsTable', 1)">Type</th>
        <th onclick="sortTable('classificationsTable', 2)">Match</th>
        <th onclick="sortTable('classificationsTable', 3)">Confidence</th>
        <th onclick="sortTable('classificationsTable', 4)">Reasoning</th>
        <th onclick="sortTable('classificationsTable', 5)">Model</th>
        <th onclick="sortTable('classificationsTable', 6)">Valid On</th>
        <th onclick="sortTable('classificationsTable', 7)">Valid Until</th>
        <th onclick="sortTable('classificationsTable', 8)">Created At</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {{ROWS}}
    </tbody>
  </table>
  {{ERRORS_SECTION}}
  <script src="/static/classifications.js"></script>
</body>
</html>
